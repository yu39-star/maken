<!DOCTYPE html>
<html>
<body>
<h1>
  Make N Solver 
  <a href="log.html" style="color: inherit; text-decoration: none;">
    v2.0.0<br>
  </a>
  <a href="index.html">
    Reload
  </a>
</h1>

<script>
const nums = prompt("Type nums and ans: ex) 1 2 3 4 10").trim().split(" ");
const first = Number(nums[0]);
const second = Number(nums[1]);
const third = Number(nums[2]);
const forth = Number(nums[3]);
const ans = Number(nums[4]);
const numbers = [first, second, third, forth];
const mark = ["+","-","*","/"];

let kotaetati = [];
let atta = false;

document.write(
  "I'm trying to make " +
  Math.trunc(ans) +
  " with " +
  Math.trunc(first) + ", " +
  Math.trunc(second) + ", " +
  Math.trunc(third) + ", " +
  Math.trunc(forth) + ".<br>"
);

document.write("Answers:<br>");

let nans = false;

for (let a=0; a<4; a++){
  for (let b=0; b<4; b++){
    for (let c=0; c<4; c++){
      for (let d=0; d<4; d++){

        if(a!=b && a!=c && a!=d && b!=c && b!=d && c!=d){

          let iti = numbers[a];
          let ni = numbers[b];
          let san = numbers[c];
          let yon = numbers[d];

          for (let x=0; x<4; x++){
            for (let y=0; y<4; y++){
              for (let z=0; z<4; z++){

                let ikko = mark[x];
                let niko = mark[y];
                let sanko = mark[z];

                let value;
                try {
                  value = eval(`( ( ${iti} ${ikko} ${ni} ) ${niko} ${san}) ${sanko} ${yon}`);
                } catch {
                  continue;
                }
                if (Math.abs(value - ans) < 1e-6) {
                  const kotae = `( ( ${iti|0} ${ikko} ${ni|0} ) ${niko} ${san|0} ) ${sanko} ${yon|0}`;
                  atta = kotaetati.includes(kotae);
                  if (!atta) {
                    kotaetati.push(kotae);
                    document.write(kotae + "<br>");
                    nans = true;
                  }
                  atta = false;
                }

                try {
                  value = eval(`( ${iti} ${ikko} ( ${ni} ${niko} ${san} ) ) ${sanko} ${yon}`);
                } catch {
                  continue;
                }
                if (Math.abs(value - ans) < 1e-6) {
                  const kotae = `( ${iti|0} ${ikko} ( ${ni|0} ${niko} ${san|0} ) ) ${sanko} ${yon|0}`;
                  atta = kotaetati.includes(kotae);
                  if (!atta) {
                    kotaetati.push(kotae);
                    document.write(kotae + "<br>");
                    nans = true;
                  }
                  atta = false;
                }

                try {
                  const left = eval(`${iti}${ikko}${ni}`);
                  const right = eval(`${san}${sanko}${yon}`);
                  value = eval(`${left}${niko}${right}`);
                } catch {
                  continue;
                }
                if (Math.abs(value - ans) < 1e-6) {
                  const kotae = `( ${iti|0} ${ikko} ${ni|0} ) ${niko} ( ${san|0} ${sanko} ${yon|0} )`;
                  atta = kotaetati.includes(kotae);
                  if (!atta) {
                    kotaetati.push(kotae);
                    document.write(kotae + "<br>");
                    nans = true;
                  }
                  atta = false;
                }
      
                try {
                  value = eval(`${iti} ${ikko} ( ( ${ni} ${niko} ${san} ) ${sanko} ${yon} )`);
                } catch {
                  continue;
                }
                if (Math.abs(value - ans) < 1e-6) {
                  const kotae = `${iti|0} ${ikko} ( ( ${ni|0} ${niko} ${san|0} ) ${sanko} ${yon|0} )`;
                  atta = kotaetati.includes(kotae);
                  if (!atta) {
                    kotaetati.push(kotae);
                    document.write(kotae + "<br>");
                    nans = true;
                  }
                  atta = false;
                }

                try {
                  value = eval(`${iti} ${ikko} ( ${ni} ${niko} ( ${san} ${sanko} ${yon} ) )`);
                } catch {
                  continue;
                }
                if (Math.abs(value - ans) < 1e-6) {
                  const kotae = `${iti|0} ${ikko} ( ${ni|0} ${niko} ( ${san|0} ${sanko} ${yon|0} ) )`;
                  atta = kotaetati.includes(kotae);
                  if (!atta) {
                    kotaetati.push(kotae);
                    document.write(kotae + "<br>");
                    nans = true;
                  }
                  atta = false;
                }
              }
            }
          }
        }
      }
    }
  }
}

if (!nans) {
  document.write("Nothing<br>");
}

document.write("Thanks for using.<br>");
</script>
</body>
</html>
